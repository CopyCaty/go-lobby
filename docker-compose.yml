services:
  mysql:
    image: mysql:8.0
    container_name: go-lobby-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: go_lobby
    ports:
      - "3305:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: go-lobby-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
