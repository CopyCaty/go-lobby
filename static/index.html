<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>go-lobby 测试页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --panel: #0f1a30;
        --border: rgba(255, 255, 255, 0.12);
        --muted: rgba(255, 255, 255, 0.7);
        --text: rgba(255, 255, 255, 0.92);
        --accent: #4f8cff;
        --danger: #ff4d4f;
        --ok: #2ecc71;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        background: radial-gradient(1200px 800px at 10% 10%, #162a56 0%, var(--bg) 45%) no-repeat;
        color: var(--text);
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 16px 48px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0;
      }
      .hint {
        font-size: 12px;
        color: var(--muted);
        margin: 0;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 14px;
      }
      @media (max-width: 860px) {
        .grid { grid-template-columns: 1fr; }
      }
      .panel {
        background: rgba(15, 26, 48, 0.72);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        backdrop-filter: blur(10px);
      }
      .panel h2 {
        font-size: 14px;
        margin: 0 0 10px 0;
        color: rgba(255, 255, 255, 0.9);
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px;
      }
      input {
        width: 100%;
        padding: 10px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.22);
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: rgba(79, 140, 255, 0.6);
        box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.18);
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 520px) {
        .row { grid-template-columns: 1fr; }
      }
      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 14px;
      }
      button {
        appearance: none;
        border: 1px solid rgba(79, 140, 255, 0.55);
        background: rgba(79, 140, 255, 0.18);
        color: rgba(255, 255, 255, 0.92);
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover { background: rgba(79, 140, 255, 0.26); }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }
      .ghost {
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.12);
      }
      .status {
        font-size: 12px;
        color: var(--muted);
      }
      .status.ok { color: rgba(46, 204, 113, 0.95); }
      .status.bad { color: rgba(255, 77, 79, 0.95); }
      pre {
        margin: 0;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.22);
        overflow: auto;
        max-height: 520px;
        color: rgba(255, 255, 255, 0.9);
        font-size: 12px;
        line-height: 1.5;
      }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .small {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .small code { color: rgba(255, 255, 255, 0.88); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>go-lobby 本地测试页</h1>
        <p class="hint">接口：<code>POST /api/v1/users/register</code></p>
      </header>

      <div class="grid">
        <section class="panel">
          <h2>用户注册</h2>
          <div class="row">
            <div>
              <label for="user_name">user_name</label>
              <input id="user_name" autocomplete="username" placeholder="至少 6 位" />
            </div>
            <div>
              <label for="nickname">nickname</label>
              <input id="nickname" autocomplete="nickname" placeholder="至少 6 位" />
            </div>
          </div>

          <label for="password">password</label>
          <input id="password" type="password" autocomplete="new-password" placeholder="至少 8 位" />

          <div class="actions">
            <button id="submit">注册</button>
            <button id="fill" class="ghost" type="button">填充示例</button>
            <span id="status" class="status"></span>
          </div>

          <div class="small">
            说明：服务端会将 <code>password</code> 做 bcrypt 哈希后写入 <code>gl_user.password_hash</code>。
          </div>
        </section>

        <section class="panel">
          <h2>响应</h2>
          <pre><code id="output">{}</code></pre>
          <div class="small">
            如果返回 400：检查用户名/昵称/密码长度，或用户名是否已存在。
          </div>
        </section>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function setStatus(text, kind) {
        const el = $("status");
        el.textContent = text || "";
        el.className = "status" + (kind ? " " + kind : "");
      }

      function pretty(obj) {
        try { return JSON.stringify(obj, null, 2); } catch (e) { return String(obj); }
      }

      async function register() {
        const payload = {
          user_name: $("user_name").value.trim(),
          nickname: $("nickname").value.trim(),
          password: $("password").value,
        };

        $("submit").disabled = true;
        setStatus("请求中...", "");
        $("output").textContent = "{}";

        try {
          const resp = await fetch("/api/v1/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const text = await resp.text();
          let data;
          try { data = JSON.parse(text); } catch (e) { data = { raw: text }; }

          $("output").textContent = pretty(data);
          if (resp.ok && data && data.code === 0) {
            setStatus("注册成功", "ok");
          } else {
            setStatus("注册失败", "bad");
          }
        } catch (e) {
          $("output").textContent = pretty({ error: String(e) });
          setStatus("请求异常", "bad");
        } finally {
          $("submit").disabled = false;
        }
      }

      $("submit").addEventListener("click", register);
      $("fill").addEventListener("click", () => {
        const suffix = Math.random().toString(16).slice(2, 8);
        $("user_name").value = "test_" + suffix;
        $("nickname").value = "nick_" + suffix;
        $("password").value = "password_" + suffix;
        setStatus("", "");
      });
    </script>
  </body>
</html>
